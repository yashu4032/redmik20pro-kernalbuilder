name: Build Android 16 Kernel for Raphael

on:
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub Actions tab

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Clone Toolchain & Source
        run: |
          mkdir -p workspace
          cd workspace
          # Clone the Android 16 compatible crDroid kernel tree for SM8150 devices (Raphael)
          git clone --depth=1 https://github.com/crdroidandroid/android_kernel_xiaomi_sm8150.git -b 16.0 kernel_source
          # Clone Proton Clang compiler
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

      - name: Compile Kernel
        run: |
          cd workspace/kernel_source
          
          # Setup Environment Variables
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="${{ github.workspace }}/workspace/toolchain/bin:$PATH"
          
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Initialize Config
          make O=out clean
          make O=out mrproper
          make O=out raphael_defconfig
          
          # Compile using all available virtual cores provided by the GitHub runner
          make -j$(nproc --all) O=out \
              CC=$CC \
              CLANG_TRIPLE=$CLANG_TRIPLE \
              CROSS_COMPILE=$CROSS_COMPILE \
              CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32

      - name: Check Output File
        run: |
          if [ -f workspace/kernel_source/out/arch/arm64/boot/Image.gz-dtb ]; then
              echo "Kernel build succeeded!"
          else
              echo "Kernel image file missing! Check compile logs above."
              exit 1
          fi

      - name: Upload Compiled Kernel File
        uses: actions/upload-artifact@v4
        with:
          name: Raphael-A16-Kernel-Image
          path: workspace/kernel_source/out/arch/arm64/boot/Image.gz-dtb
